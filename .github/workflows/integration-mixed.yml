name: Integration Tests (Mixed Provider)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    # KVM required for Firecracker VMs.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::KVM not available on this runner"
            exit 1
          fi
          sudo chmod 666 /dev/kvm
      - name: Run mixed-provider integration tests
        run: make integration-test-mixed
