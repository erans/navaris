name: Integration Tests (Firecracker)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    # Pin to ubuntu-24.04 — KVM is available on GitHub-hosted runners
    # but not guaranteed on all ubuntu-latest aliases or self-hosted runners.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        image: [alpine-3.21, debian-12]
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::KVM not available on this runner"
            exit 1
          fi
          sudo chmod 666 /dev/kvm
      - name: Run integration tests (${{ matrix.image }})
        run: make integration-test-firecracker
        env:
          NAVARIS_BASE_IMAGE: ${{ matrix.image }}
