name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release archives
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh --version "${GITHUB_REF_NAME}" --arch amd64 --output-dir dist --formats tar.gz,deb
          scripts/package-release.sh --version "${GITHUB_REF_NAME}" --arch arm64 --output-dir dist --formats tar.gz,deb --skip-ui-build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --generate-notes
          fi
