name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: [alpine/3.21, debian/12]
    steps:
      - uses: actions/checkout@v6
      - name: Run integration tests (${{ matrix.image }})
        run: make integration-test
        env:
          NAVARIS_BASE_IMAGE: ${{ matrix.image }}
