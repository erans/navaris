# Mixed-provider integration test: Incus containers + Firecracker VMs
# in a single navarisd instance.
services:
  incus:
    build:
      context: .
      dockerfile: Dockerfile.incus
    privileged: true
    cgroup: host
    environment:
      INCUS_PRELOAD_IMAGE: images:alpine/3.21
    volumes:
      - incus-socket:/var/lib/incus
      - incus-data:/var/lib/incus/storage-pools
    healthcheck:
      test: ["CMD-SHELL", "incus query /1.0 >/dev/null 2>&1 && test -f /tmp/incus-ready"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 30s

  navarisd:
    build:
      context: .
      dockerfile: Dockerfile.navarisd-firecracker
      args:
        BUILD_TAGS: firecracker,incus
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    command:
      - --listen=:8080
      - --db-path=/tmp/navaris.db
      - --incus-socket=/var/lib/incus/unix.socket
      - --firecracker-bin=/usr/local/bin/firecracker
      - --jailer-bin=/usr/local/bin/jailer
      - --kernel-path=/opt/firecracker/vmlinux
      - --image-dir=/opt/firecracker/images
      - --chroot-base=/srv/firecracker
      - --snapshot-dir=/srv/firecracker/snapshots
      - --enable-jailer=false
      - --auth-token=test-token
      - --log-level=debug
    volumes:
      - incus-socket:/var/lib/incus:ro
    depends_on:
      incus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--header",
             "Authorization: Bearer test-token",
             "http://localhost:8080/v1/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      NAVARIS_API_URL: http://navarisd:8080
      NAVARIS_TOKEN: test-token
      NAVARIS_CLI: /usr/local/bin/navaris
      NAVARIS_TEST_MIXED: "1"
    depends_on:
      navarisd:
        condition: service_healthy
    profiles:
      - test

volumes:
  incus-socket:
  incus-data:
